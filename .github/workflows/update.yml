name: Update transposition data

on:
  schedule:
    - cron: "0 6 * * 1-5"   # weekday mornings, 06:00 UTC
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script
        id: update
        env:
          # Optional. If unset, the AI summarisation step is skipped entirely.
          # AI only ever drafts a `proposedSummary` for human review — it
          # never changes a country's status or published summary.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/update.py

      - name: Commit refreshed data
        run: |
          git config user.name "ptd-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: automated data refresh $(date -u +%F)"
          git push

      - name: Open review issue when changes detected
        if: steps.update.outputs.changes_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.update.outputs.change_summary }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Review needed: official source changes detected (${new Date().toISOString().slice(0,10)})`,
              labels: ["status-review"],
              body: [
                "The automated monitor detected changes at official sources.",
                "Countries below are flagged with `reviewNeeded: true` in data.json,",
                "and may carry an AI-drafted `proposedSummary` (from official text only).",
                "",
                "**A human must verify the official source, then update `status`,",
                "`summary`, `expectedDate` and `lastUpdated` manually.** The",
                "automation never changes a status.",
                "",
                "```",
                summary,
                "```"
              ].join("\n")
            });
